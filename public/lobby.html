<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Connect</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="lobby-container">
        <h1>🎥 CodeAlpha Connect</h1>
        <p class="subtitle">Welcome, <span id="welcomeName"></span>!</p>

        <div class="lobby-form">
            <input type="text" id="usernameInput" placeholder="Your name">
            <input type="text" id="roomInput" placeholder="Room ID (e.g. team-meeting)" maxlength="30">
            <button id="joinBtn" class="btn">Join Room 🚀</button>
            <button id="createBtn" class="btn-secondary">Generate Random Room</button>
            <button id="logoutBtn" class="btn-secondary">Logout</button>
        </div>
    </div>

  
    <script src="/js/lobby.js"></script>
</body>
</html>
